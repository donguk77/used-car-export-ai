# 공개 샘플·1차 자료 레지스트리
#
# scripts/fetch_public_samples.py 가 이 파일을 읽어 docs/samples/<category>/ 로 다운로드한다.
# type: pdf  → 직접 다운로드
# type: ref  → 다운로드 안 함, REGISTRY.md 에 링크만 기록 (로그인·JS 렌더링 페이지 등)
#
# verified_on 은 URL 이 실제 살아있음을 마지막으로 확인한 날짜.
# 출처는 1·2차 권위 자료로 한정 (정부·국제기구·선사 공식 문서). 블로그·요약글 X.
#
# 카테고리:
#   - 도착국 규제: kenya, libya, dominican_republic, uae, nigeria, jordan, kotra_country
#   - 한국 표준:   korea_customs, fta_co
#   - 국제 표준:   incoterms, shipping_lines (선사 B/L·SI 양식), psi (선적전검사)
#   - 참조:       references_misc

