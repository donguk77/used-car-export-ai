    psi_required:
      - JEVIC
      - QISJ
    doc_translation_lang: null  # 영문 OK
    consular_required: false
    pre_registration: KRA_iCMS
    required_documents:
      - commercial_invoice
      - packing_list
      - bill_of_lading
      - certificate_of_origin
      - jevic_certificate
      - qisj_certificate
    source_url: https://www.kebs.org
    effective_from: 2026-01-01
    last_verified_at: 2026-05-09
