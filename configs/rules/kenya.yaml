# 출처: docs/used_car_export_top20_countries.md §10, used_car_export_research_v2.md §5.1

country:
  code: KE
  name_en: Kenya
  name_ko: 케냐
  name_local: Kenya
  region: africa
  primary_language: en
  business_language: en
  steering: RHD
  is_high_risk: false
  is_russia_proxy_risk: false
  is_sanctioned: false
  is_blocked: false
  main_ports:
    - Mombasa
  pre_registration_system: KRA_iCMS
  consular_legalization: false
