# 캄보디아 — 동남아 대형 중고차 시장 (Phnom Penh / Sihanoukville)
# 한국 직수출 일부 + 일본 RHD 재수출 환적 허브
# 출처: WebSearch (FIDI 2024-01)

country:
  code: KH
  name_en: Cambodia
  name_ko: 캄보디아
  name_local: កម្ពុជា
  region: south_east_asia
  primary_language: km
  business_language: en
  steering: LHD  # 우측통행, LHD 권장 (단 일본 RHD 차량 일부 사용 중)
  is_high_risk: false
  is_russia_proxy_risk: false
  is_sanctioned: false
  is_blocked: false
  main_ports:
    - Sihanoukville
    - Phnom Penh
  pre_registration_system: ASYCUDA_World
  consular_legalization: false
  notes: |
    동남아 대표적 중고차 활성 시장 — 일본 RHD 차량 다수 유입.
    공식적으로는 LHD 권장이지만 RHD 단속 느슨 (실태).
    Camcontrol (Cambodia Import-Export Inspection & Fraud Repression)
    선적 전 검사 가능.
    관세 + VAT + 특별세 합계 50-70% (배기량 기반).
    크메르어 공식 + 영어 비즈니스 무난.

rules:
  - body_type_filter: passenger
    age_limit_years: 10
    age_basis: manufacture_year
    steering_required: any  # 실태 반영
    psi_required: []  # Camcontrol 선택적
    doc_translation_lang: null
    consular_required: false
    pre_registration: ASYCUDA_World
    required_documents:
      - commercial_invoice
      - packing_list
      - bill_of_lading
      - certificate_of_origin
    source_url: https://www.customs.gov.kh
    last_verified_at: 2026-05-10
