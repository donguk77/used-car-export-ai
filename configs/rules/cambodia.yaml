# 캄보디아 — 동남아 대형 중고차 시장 (Phnom Penh / Sihanoukville)
# 한국 직수출 일부 + 일본 RHD 재수출 환적 허브
# 출처: WebSearch (FIDI 2024-01)

country:
  code: KH
  name_en: Cambodia
  name_ko: 캄보디아
  name_local: កម្ពុជា
  region: south_east_asia
  primary_language: km
  business_language: en
  steering: LHD  # FIDI 2024-01 명시: "Motor vehicle must be left-hand driven" (#014)
  is_high_risk: false
  is_russia_proxy_risk: false
  is_sanctioned: false
  is_blocked: false
  main_ports:
    - Sihanoukville
    - Phnom Penh
  pre_registration_system: ASYCUDA_World
  consular_legalization: false
  notes: |
    동남아 대표적 중고차 활성 시장 (Phnom Penh / Sihanoukville).
    findings #014 — FIDI 2024-01 명시: "Motor vehicle must be left-hand driven"
    (이전 우리 추정 'any' 잘못됨 — 정정).
    관세 60-125% + 정부세 10-50% (type/age/engine 기반, FIDI 직접 인용).
    Camcontrol 사전 검사 가능. ASYCUDA World 통관.
    크메르어 공식 + 영어 비즈니스 무난.

rules:
  - body_type_filter: passenger
    age_limit_years: 10
    age_basis: manufacture_year
    steering_required: LHD_only  # findings #014 — FIDI 명시
    psi_required: []  # Camcontrol 선택적
    doc_translation_lang: null
    consular_required: false
    pre_registration: ASYCUDA_World
    required_documents:
      - commercial_invoice
      - packing_list
      - bill_of_lading
      - certificate_of_origin
    source_url: https://www.customs.gov.kh
    last_verified_at: 2026-05-10
